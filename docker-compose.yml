  # ------------------ Catalog Service ------------------
  catalog-service:
#    build: ./backend
    image: viperanna/catalog-service:${IMAGE_TAG}
    container_name: catalog-service
    env_file:
      - .env.spring
#      - .env.spring.service
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
#      data-generator:
