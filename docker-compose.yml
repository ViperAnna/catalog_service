    restart: unless-stopped

  # ------------------ Frontend ------------------
  front:
#    build: ./frontend
    image: viperanna/front:${IMAGE_TAG}
    ports:
      - "3000:3000"
    depends_on:
      catalog-service:
        condition: service_started
    command: npm run dev:java
    restart: unless-stopped
