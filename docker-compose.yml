services:

  # ------------------ MongoDB ------------------
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27018:27017"
    env_file:
      - .env.mongodb
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: >
        bash -c '
        mongosh --quiet \
          -u "$$MONGO_INITDB_ROOT_USERNAME" \
          -p "$$MONGO_INITDB_ROOT_PASSWORD" \
          --authenticationDatabase admin \
          --eval "db.runCommand({connectionStatus: 1}).ok === 1"
        '
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ------------------ MinIO ------------------
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - .env.minio
    command: server /data --console-address ":9001"
    volumes:
      - ./minio/data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ------------------ Create Buckets ------------------
  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing myminio/categories &&
       mc mb --ignore-existing myminio/products &&
      mc anonymous set public myminio/categories &&
      mc anonymous set public myminio/products
      
      "
    restart: "no"

